port: 7890
socks-port: 7891
allow-lan: true
bind-address: "*"
mode: rule
log-level: info
ipv6: false
unified-delay: true
tcp-concurrent: true

dns:
  enable: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  nameserver:
    - 223.5.5.5
    - 119.29.29.29
  fallback:
    - 8.8.8.8
    - 1.1.1.1
  fallback-filter:
    geoip: true
    geoip-code: CN

proxies:
  - name: "US-Clean"
    type: vless
    server: 38.209.123.80
    port: 51976
    uuid: b5ef95f9-f80e-4ddc-9166-6690885e948d
    network: tcp
    tls: true
    udp: true
    client-fingerprint: chrome
    servername: www.oracle.com
    reality-opts:
      public-key: pRP_wngr-71A_6Y3isQYUobhs-MmDYCO5cNZ9WGi5mY
      short-id: "14"

proxy-groups:
  - name: "Proxy"
    type: select
    proxies:
      - "US-Clean"
      - DIRECT

rule-providers:
  ChinaMax:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/ChinaMax/ChinaMax_Classical_No_Resolve.yaml
    interval: 86400
    path: "./ruleset/ChinaMax.yaml"
  Telegram:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Telegram/Telegram_No_Resolve.yaml
    interval: 86400
    path: "./ruleset/Telegram.yaml"
  Steam:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/Steam/Steam_No_Resolve.yaml
    interval: 86400
    path: "./ruleset/Steam.yaml"
  GlobalMedia:
    type: http
    behavior: classical
    url: https://raw.githubusercontent.com/blackmatrix7/ios_rule_script/master/rule/Clash/GlobalMedia/GlobalMedia_Classical_No_Resolve.yaml
    interval: 86400
    path: "./ruleset/GlobalMedia.yaml"

